<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - منصة ارتواء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register.css">
</head>
<body class="registration-page">

    <header class="main-header" style="background-color: var(--dark-bg);">
        <div class="header-right-section">
            <div class="logo">
                <img src="images/logo.png" alt="لوقو ارتواء">
            </div>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="structure.html">الهيكل التنظيمي</a>
            </nav>
        </div>
        <button class="btn-login" onclick="window.location.href='index.html'" style="background-color: #ef4444;">تسجيل الخروج</button>
    </header>

    <div class="container" style="width: 100%; max-width: 1000px; margin-top: 40px; padding: 0 20px;">
        <div class="register-card" style="max-width: 100%; text-align: right; padding: 40px;">
            
            <div style="display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 25px; margin-bottom: 30px; flex-wrap: wrap;">
                <div style="width: 80px; height: 80px; background: #e6f7f3; color: var(--jungle-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                    <i class="fa-solid fa-user-astronaut"></i>
                </div>
                <div>
                    <h2 style="color: var(--dark-bg); font-weight: 800; font-size: 1.8rem; margin-bottom: 5px;">مرحباً بك، تهاني</h2>
                    <p style="color: #64748b; font-size: 0.95rem;">عضو في القسم التقني لمجتمع ارتواء الرقمي</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px;">
            
            <div style="background: #f8fafc; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0;">
                <h4 style="color: var(--dark-bg); margin-bottom: 15px; font-weight: 700;">
                    <i class="fa-solid fa-circle-info" style="color: var(--jungle-green); margin-left: 8px;"></i>حالة العضوية
                </h4>
                <span style="background: #e6f7f3; color: var(--jungle-green); padding: 6px 15px; border-radius: 50px; font-weight: 700; font-size: 0.85rem; display: inline-block;">نشط ومكتمل</span>
                <p style="color: #64748b; font-size: 0.85rem; margin-top: 15px; line-height: 1.6;">تم التحقق من البيانات والموافقة على الانضمام للجان التقنية بنجاح.</p>
            </div>

            <div style="background: #f8fafc; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0;">
                <h4 style="color: var(--dark-bg); margin-bottom: 15px; font-weight: 700;">
                    <i class="fa-solid fa-bolt" style="color: var(--jungle-green); margin-left: 8px;"></i>مساهماتك الرقمية
                </h4>
                <ul style="list-style: none; color: #475569; font-size: 0.9rem; line-height: 2; padding: 0; margin: 0;">
                    <li><i class="fa-solid fa-check" style="color: var(--jungle-green); margin-left: 8px;"></i> الساعات المعتمدة: 25 ساعة</li>
                    <li><i class="fa-solid fa-check" style="color: var(--jungle-green); margin-left: 8px;"></i> الفعاليات المشارك بها: 4</li>
                </ul>
            </div>

        </div>

            </div>

            <h3 style="color: var(--dark-bg); font-weight: 800; margin-bottom: 20px; font-size: 1.3rem;">مهام وإجراءات سريعة</h3>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <button class="btn-submit" style="width: auto; padding: 12px 25px; font-size: 0.95rem; margin: 0;" onclick="window.location.href='index.html#events-section'">تصفح الورش القادمة</button>
                <button class="btn-secondary" style="width: auto; padding: 12px 25px; font-size: 0.95rem; margin: 0;" onclick="alert('سيتم فتح بوابة رفع التقارير قريباً')">رفع تقرير المساهمة</button>
            </div>
        </div>
    </div>

</body>
</html>
